<svg viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027">
        <animate attributeName="stop-color" values="#0f2027;#1b1035;#0f2027" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#203a43">
        <animate attributeName="stop-color" values="#203a43;#2c1e4a;#203a43" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#2c5364">
        <animate attributeName="stop-color" values="#2c5364;#3a2f63;#2c5364" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40,0 L0,0 0,40" fill="none" stroke="#4FC1E9" stroke-width="0.5" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1000" height="220" fill="url(#bg)"/>

  <g>
    <rect width="1000" height="220" fill="url(#grid)">
      <animateTransform attributeName="patternTransform" type="translate" values="0,0;40,40" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- moving scanline -->
  <rect x="0" y="0" width="1000" height="3" fill="#4FC1E9" opacity="0.25">
    <animate attributeName="y" values="0;220;0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- glitch watermark: 1337, RGB-split jitter -->
  <g font-family="Fira Code, Consolas, monospace" font-weight="700" font-size="120" text-anchor="middle">
    <text x="500" y="118" fill="#00fff9" opacity="0.16">
      1337
      <animate attributeName="x" values="500;492;500;509;500" keyTimes="0;0.2;0.4;0.7;1" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="118" fill="#ff2079" opacity="0.16">
      1337
      <animate attributeName="x" values="500;509;500;492;500" keyTimes="0;0.2;0.4;0.7;1" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="118" fill="#ffffff" opacity="0.20">
      1337
      <animate attributeName="opacity" values="0.20;0.20;0.03;0.20;0.20;0.05;0.20" keyTimes="0;0.4;0.44;0.48;0.8;0.83;1" dur="3s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- terminal-style foreground line -->
  <text x="500" y="178" text-anchor="middle" font-family="Fira Code, Consolas, monospace" font-size="20" fill="#7fe7ff" letter-spacing="0.5">
    <tspan fill="#4FC1E9">$</tspan> whoami
  </text>
  <text x="500" y="205" text-anchor="middle" font-family="Fira Code, Consolas, monospace" font-size="20" fill="#eaf6fb" letter-spacing="0.5">
    software_engineer_student @ 1337<tspan fill="#4FC1E9" opacity="1">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" repeatCount="indefinite"/>
      _
    </tspan>
  </text>
</svg>
