<svg viewBox="0 0 700 130" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <style>
      .pixel-text { font-family: 'Fira Code', Consolas, monospace; font-weight: 700; }
    </style>
  </defs>

  <!-- pixel bracket accents, fully inside frame -->
  <g fill="#4FC1E9">
    <rect x="24" y="52" width="8" height="8"/>
    <rect x="24" y="60" width="8" height="8"/>
    <rect x="24" y="68" width="8" height="8"/>
    <rect x="32" y="52" width="8" height="8"/>
  </g>
  <g fill="#4FC1E9">
    <rect x="668" y="52" width="8" height="8"/>
    <rect x="668" y="60" width="8" height="8"/>
    <rect x="668" y="68" width="8" height="8"/>
    <rect x="660" y="52" width="8" height="8"/>
  </g>

  <!-- stepped pixel-shadow layers -->
  <text x="356" y="80" text-anchor="middle" class="pixel-text" font-size="40" fill="#0d2b33">Mohamed Elayyady</text>
  <text x="353" y="77" text-anchor="middle" class="pixel-text" font-size="40" fill="#134450">Mohamed Elayyady</text>
  <text x="350" y="74" text-anchor="middle" class="pixel-text" font-size="40" fill="#1c5f6e">Mohamed Elayyady</text>

  <!-- main text, single accent color -->
  <text x="347" y="71" text-anchor="middle" class="pixel-text" font-size="40" fill="#4FC1E9">Mohamed Elayyady</text>

  <!-- a few deliberate accent pixels, tucked near the brackets only -->
  <rect x="14" y="30" width="6" height="6" fill="#ff8a3d">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="680" y="94" width="6" height="6" fill="#ff8a3d">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
  </rect>
</svg>